version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      laravel:
        patterns:
          - "laravel/*"
          - "livewire/*"
          - "illuminate/*"
      dev-tooling:
        dependency-type: "development"
    labels:
      - "dependencies"
      - "php"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      frontend-build:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "tailwindcss"
          - "@tailwindcss/*"
      fullcalendar:
        patterns:
          - "@fullcalendar/*"
    labels:
      - "dependencies"
      - "javascript"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
